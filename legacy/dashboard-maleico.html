<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Anhídrido Maleico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #f3f4f6;
      padding: 24px;
    }

    .container { max-width: 1600px; margin: 0 auto; }
    
    .header {
      margin-bottom: 32px;
      border-bottom: 3px solid #3b82f6;
      padding-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle { color: #9ca3af; font-size: 14px; }

    .nav {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid #1f2937;
      padding-bottom: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 24px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      color: #f3f4f6;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .nav-btn:hover { border-color: #3b82f6; }

    .nav-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      border-left: 4px solid #3b82f6;
      padding-left: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(135deg, #111827 0%, rgba(59, 130, 246, 0.1) 100%);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .stat-label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: monospace;
    }

    .stat-unit {
      font-size: 16px;
      margin-left: 6px;
      color: #9ca3af;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }

    .badge-success { background: #10b981; color: #fff; }
    .badge-warning { background: #f59e0b; color: #000; }
    .badge-danger { background: #ef4444; color: #fff; }
    .badge-info { background: #06b6d4; color: #fff; }

    .equation {
      text-align: center;
      font-size: 24px;
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 1px;
      margin: 20px 0;
    }

    .result-box {
      background: #111827;
      border: 2px solid #10b981;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      margin-top: 24px;
    }

    .result-title {
      color: #10b981;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .result-value {
      font-size: 48px;
      font-weight: 800;
      color: #10b981;
      font-family: monospace;
    }

    .result-desc {
      font-size: 16px;
      color: #9ca3af;
      margin-top: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .metric-box {
      padding: 16px;
      border-radius: 8px;
    }

    .metric-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 700;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
    }

    .table thead {
      background: #3b82f6;
      color: #fff;
    }

    .table th {
      padding: 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid #1f2937;
      font-size: 13px;
    }

    .table tbody tr {
      background: #111827;
    }

    .table tbody tr:nth-child(even) {
      background: rgba(59, 130, 246, 0.05);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .process-stage {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .process-stage.warning { border-color: #f59e0b; }
    .process-stage.normal { border-color: #10b981; }

    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stage-name {
      font-weight: 600;
      font-size: 14px;
    }

    .stage-details {
      font-size: 12px;
      color: #9ca3af;
    }

    .color-primary { color: #3b82f6; }
    .color-secondary { color: #06b6d4; }
    .color-success { color: #10b981; }
    .color-warning { color: #f59e0b; }
    .color-danger { color: #ef4444; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #1f2937;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6 0%, #06b6d4 100%);
      transition: width 0.5s ease;
    }

    .cost-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 6px;
    }

    /* Estilos para el diagrama del reactor */
    .reactor-diagram {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .reactor-svg {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: block;
    }

    .stream-line {
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 10 5;
      animation: flow 2s linear infinite;
    }

    @keyframes flow {
      to { stroke-dashoffset: -15; }
    }

    .stream-arrow {
      fill: currentColor;
    }

    .reactor-body {
      transition: all 0.3s ease;
    }

    .reactor-body:hover {
      filter: brightness(1.2);
    }

    .control-panel {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .gauge {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
    }

    .gauge svg {
      transform: rotate(-90deg);
    }

    .gauge-bg {
      fill: none;
      stroke: #1f2937;
      stroke-width: 10;
    }

    .gauge-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }

    .gauge-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .gauge-value {
      font-size: 24px;
      font-weight: 700;
      font-family: monospace;
    }

    .gauge-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
    }

    .stream-label {
      font-size: 12px;
      font-weight: 600;
      fill: #f3f4f6;
    }

    .flow-particle {
      animation: particle-flow 3s linear infinite;
    }

    @keyframes particle-flow {
      0% { opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

    .alarm-indicator {
      animation: pulse-alarm 1.5s ease-in-out infinite;
    }

    @keyframes pulse-alarm {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚗️ PRODUCCIÓN DE ANHÍDRIDO MALEICO</h1>
      <p class="subtitle">Sistema de Monitoreo y Control Industrial | Oxidación Catalítica de n-Butano | Producción Semanal</p>
    </div>

    <div class="nav">
      <button class="nav-btn active" onclick="showView('production')">🏭 Producción</button>
      <button class="nav-btn" onclick="showView('diagram')">🔄 Diagrama Reactor</button>
      <button class="nav-btn" onclick="showView('reactor')">⚛️ Monitoreo</button>
      <button class="nav-btn" onclick="showView('quality')">✓ Calidad</button>
      <button class="nav-btn" onclick="showView('economics')">💰 Economía</button>
    </div>

    <div id="production" class="view active"></div>
    <div id="diagram" class="view"></div>
    <div id="reactor" class="view"></div>
    <div id="quality" class="view"></div>
    <div id="economics" class="view"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // CONSTANTES Y DATOS
    // ═══════════════════════════════════════════════════════

    const MOLECULAR_WEIGHTS = {
      nButane: 58.12,
      oxygen: 32.00,
      maleicAnhydride: 98.06,
      water: 18.02,
    };

    const STOICH_RATIOS = {
      oxygenToButane: 3.5,
      maleicToButane: 1.0,
      waterToButane: 4.0,
    };

    const PRODUCTION_DATA = {
      nButaneVolume: 100000,        // Litros totales procesados en 1 semana
      nButaneDensity: 0.573,         // kg/L a 25°C
      reactionYield: 68,             // % rendimiento selectivo
      temperature: 420,              // °C temperatura del reactor
      pressure: 2.1,                 // bar presión del reactor
      oxygenExcess: 15,              // % exceso de oxígeno
      catalystType: "V2O5-MoO3",    // Catalizador de vanadio-molibdeno
      conversionRate: 95,            // % conversión de n-butano
      productionPeriod: 7,           // días de producción continua
      operatingHours: 168,           // horas de operación (7 días × 24 h)
    };

    const PROCESS_STAGES = [
      { name: "Vaporización", temp: 150, pressure: 1.0, energy: 85, efficiency: 98, status: "normal" },
      { name: "Mezclado", temp: 180, pressure: 1.2, energy: 45, efficiency: 99, status: "normal" },
      { name: "Precalentador", temp: 280, pressure: 1.8, energy: 120, efficiency: 96, status: "normal" },
      { name: "Reactor Catalítico", temp: 420, pressure: 2.1, energy: 450, efficiency: 95, status: "normal" },
      { name: "Enfriamiento 1°", temp: 250, pressure: 1.9, energy: 180, efficiency: 97, status: "normal" },
      { name: "Enfriamiento 2°", temp: 120, pressure: 1.5, energy: 150, efficiency: 98, status: "normal" },
      { name: "Absorción", temp: 50, pressure: 1.1, energy: 95, efficiency: 94, status: "warning" },
      { name: "Destilación", temp: 200, pressure: 0.5, energy: 280, efficiency: 92, status: "normal" },
      { name: "Purificación", temp: 165, pressure: 0.3, energy: 220, efficiency: 90, status: "normal" },
      { name: "Cristalización", temp: 60, pressure: 1.0, energy: 110, efficiency: 96, status: "normal" },
      { name: "Secado", temp: 85, pressure: 0.8, energy: 140, efficiency: 97, status: "normal" },
      { name: "Almacenamiento", temp: 25, pressure: 1.0, energy: 15, efficiency: 100, status: "normal" },
    ];

    const QUALITY_DATA = [
      { batch: "MA-2026-001", purity: 99.5, color: "Blanco", yield: 68.2, status: "Aprobado" },
      { batch: "MA-2026-002", purity: 99.7, color: "Blanco", yield: 69.1, status: "Aprobado" },
      { batch: "MA-2026-003", purity: 99.3, color: "Amarillo", yield: 66.5, status: "Rechazado" },
      { batch: "MA-2026-004", purity: 99.6, color: "Blanco", yield: 68.8, status: "Aprobado" },
      { batch: "MA-2026-005", purity: 99.8, color: "Blanco", yield: 70.2, status: "Aprobado" },
    ];

    const ECONOMIC_DATA = {
      butanePrice: 0.85,              // USD/kg
      oxygenPrice: 0.12,              // USD/kg
      maleicAnhydridePrice: 2.45,     // USD/kg
      energyCost: 0.08,               // USD/kWh
      catalystCost: 450 * 7,          // USD/semana (reposición semanal)
      laborCost: 850 * 7,             // USD/semana (7 días × 3 turnos)
      maintenanceCost: 320 * 7,       // USD/semana (mantenimiento continuo)
    };

    // ═══════════════════════════════════════════════════════
    // CÁLCULOS
    // ═══════════════════════════════════════════════════════

    function calculateProduction() {
      const massButane = PRODUCTION_DATA.nButaneVolume * PRODUCTION_DATA.nButaneDensity;
      const massButaneGrams = massButane * 1000;
      const molesButane = massButaneGrams / MOLECULAR_WEIGHTS.nButane;
      const molesMATheoretical = molesButane * STOICH_RATIOS.maleicToButane;
      const massMATheoretical = molesMATheoretical * MOLECULAR_WEIGHTS.maleicAnhydride;
      const massMAReal = massMATheoretical * 
                         (PRODUCTION_DATA.conversionRate / 100) * 
                         (PRODUCTION_DATA.reactionYield / 100);
      const molesO2Theoretical = molesButane * STOICH_RATIOS.oxygenToButane;
      const molesO2Real = molesO2Theoretical * (1 + PRODUCTION_DATA.oxygenExcess / 100);
      const massO2Real = molesO2Real * MOLECULAR_WEIGHTS.oxygen;
      const molesWater = molesButane * STOICH_RATIOS.waterToButane * (PRODUCTION_DATA.conversionRate / 100);
      const massWater = molesWater * MOLECULAR_WEIGHTS.water;
      
      return {
        input: {
          butaneMass: massButane,
          butaneMoles: molesButane,
          oxygenMass: massO2Real / 1000,
          oxygenMoles: molesO2Real,
        },
        output: {
          maleicAnhydrideMass: massMAReal / 1000,
          maleicAnhydrideMoles: (massMAReal / MOLECULAR_WEIGHTS.maleicAnhydride),
          waterMass: massWater / 1000,
          waterMoles: molesWater,
        },
        theoretical: {
          maleicAnhydrideMass: massMATheoretical / 1000,
        },
        yields: {
          conversion: PRODUCTION_DATA.conversionRate,
          selectivity: PRODUCTION_DATA.reactionYield,
          overall: (PRODUCTION_DATA.conversionRate * PRODUCTION_DATA.reactionYield) / 100,
        }
      };
    }

    function calculateEconomics(calc) {
      const butaneCost = calc.input.butaneMass * ECONOMIC_DATA.butanePrice;
      const oxygenCost = calc.input.oxygenMass * ECONOMIC_DATA.oxygenPrice;
      const totalEnergy = PROCESS_STAGES.reduce((sum, s) => sum + s.energy, 0);
      const energyCost = totalEnergy * ECONOMIC_DATA.energyCost;
      
      const totalCost = butaneCost + oxygenCost + energyCost + 
                        ECONOMIC_DATA.catalystCost + 
                        ECONOMIC_DATA.laborCost + 
                        ECONOMIC_DATA.maintenanceCost;
      
      const revenue = calc.output.maleicAnhydrideMass * ECONOMIC_DATA.maleicAnhydridePrice;
      const profit = revenue - totalCost;
      const profitMargin = (profit / revenue) * 100;
      
      return {
        costs: {
          butane: butaneCost,
          oxygen: oxygenCost,
          energy: energyCost,
          catalyst: ECONOMIC_DATA.catalystCost,
          labor: ECONOMIC_DATA.laborCost,
          maintenance: ECONOMIC_DATA.maintenanceCost,
          total: totalCost,
        },
        revenue: revenue,
        profit: profit,
        profitMargin: profitMargin,
        costPerKg: totalCost / calc.output.maleicAnhydrideMass,
      };
    }

    const CALC = calculateProduction();
    const ECONOMICS = calculateEconomics(CALC);

    // ═══════════════════════════════════════════════════════
    // FUNCIONES DE RENDER
    // ═══════════════════════════════════════════════════════

    function showView(viewId) {
      // Actualizar botones
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // Actualizar vistas
      document.querySelectorAll('.view').forEach(view => {
        view.classList.remove('active');
      });
      document.getElementById(viewId).classList.add('active');
    }

    function renderProduction() {
      return `
        <div class="section">
          <h2 class="section-title">⚖️ Balance de Materia</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">🛢️ n-Butano Alimentado</div>
              <div class="stat-value color-warning">${PRODUCTION_DATA.nButaneVolume.toLocaleString('es-ES')}<span class="stat-unit">L</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">⚖️ Masa de n-Butano</div>
              <div class="stat-value color-warning">${CALC.input.butaneMass.toLocaleString('es-ES', {maximumFractionDigits: 1})}<span class="stat-unit">kg</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">💨 Oxígeno Requerido</div>
              <div class="stat-value color-secondary">${CALC.input.oxygenMass.toLocaleString('es-ES', {maximumFractionDigits: 1})}<span class="stat-unit">kg</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">⭐ Anhídrido Maleico Obtenido</div>
              <div class="stat-value color-primary">${CALC.output.maleicAnhydrideMass.toLocaleString('es-ES', {maximumFractionDigits: 2})}<span class="stat-unit">kg</span></div>
            </div>
          </div>

          <div class="card" style="margin-top: 16px; border: 1px solid #06b6d4;">
            <h3 style="color: #06b6d4; margin-bottom: 16px;">⏱️ Tasas de Producción</h3>
            <div class="stats-grid">
              <div class="stat-card" style="border-color: #06b6d4;">
                <div class="stat-label">Producción por Hora</div>
                <div class="stat-value color-secondary">${(CALC.output.maleicAnhydrideMass / PRODUCTION_DATA.operatingHours).toFixed(3)}<span class="stat-unit">kg/h</span></div>
              </div>
              <div class="stat-card" style="border-color: #06b6d4;">
                <div class="stat-label">Producción por Día</div>
                <div class="stat-value color-secondary">${(CALC.output.maleicAnhydrideMass / PRODUCTION_DATA.productionPeriod).toFixed(2)}<span class="stat-unit">kg/día</span></div>
              </div>
              <div class="stat-card" style="border-color: #06b6d4;">
                <div class="stat-label">Flujo de n-Butano</div>
                <div class="stat-value color-secondary">${(PRODUCTION_DATA.nButaneVolume / PRODUCTION_DATA.operatingHours).toFixed(2)}<span class="stat-unit">L/h</span></div>
              </div>
              <div class="stat-card" style="border-color: #06b6d4;">
                <div class="stat-label">Período de Operación</div>
                <div class="stat-value color-secondary">${PRODUCTION_DATA.productionPeriod}<span class="stat-unit">días</span></div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="equation">C₄H₁₀ + 3.5 O₂ → C₄H₂O₃ + 4 H₂O</div>
            <div class="equation-info">
              <div>n-Butano + Oxígeno → Anhídrido Maleico + Agua</div>
              <div style="margin-top: 8px;">
                Catalizador: <span class="badge badge-info">${PRODUCTION_DATA.catalystType}</span>
                T = <span class="badge badge-danger">${PRODUCTION_DATA.temperature}°C</span>
                P = <span class="badge badge-warning">${PRODUCTION_DATA.pressure} bar</span>
              </div>
            </div>
          </div>

          <div class="card">
            <h3 style="color: #f3f4f6; margin-bottom: 16px;">📊 Rendimientos del Proceso</h3>
            <div class="grid-3">
              <div class="metric-box" style="background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6;">
                <div class="metric-label">CONVERSIÓN DE n-BUTANO</div>
                <div class="metric-value color-primary">${CALC.yields.conversion}%</div>
              </div>
              <div class="metric-box" style="background: rgba(6, 182, 212, 0.1); border-left: 4px solid #06b6d4;">
                <div class="metric-label">SELECTIVIDAD A MA</div>
                <div class="metric-value color-secondary">${CALC.yields.selectivity}%</div>
              </div>
              <div class="metric-box" style="background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981;">
                <div class="metric-label">RENDIMIENTO GLOBAL</div>
                <div class="metric-value color-success">${CALC.yields.overall.toFixed(1)}%</div>
              </div>
            </div>
            <div style="margin-top: 20px; padding: 16px; background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; border-radius: 8px;">
              <div class="metric-label">PRODUCCIÓN TEÓRICA MÁXIMA</div>
              <div style="font-size: 20px; font-weight: 700;" class="color-primary">${CALC.theoretical.maleicAnhydrideMass.toFixed(2)} kg</div>
              <div style="font-size: 11px; color: #9ca3af; margin-top: 4px;">Rendimiento real: ${CALC.yields.overall.toFixed(1)}% del teórico</div>
            </div>
          </div>

          <div class="result-box">
            <div class="result-title">✅ RESULTADO FINAL DE PRODUCCIÓN SEMANAL</div>
            <div class="result-value">${CALC.output.maleicAnhydrideMass.toLocaleString('es-ES', {maximumFractionDigits: 2})} kg</div>
            <div class="result-desc">de Anhídrido Maleico obtenido a partir de ${PRODUCTION_DATA.nButaneVolume.toLocaleString('es-ES')} L de n-butano en ${PRODUCTION_DATA.productionPeriod} días</div>
            <div style="margin-top: 12px; font-size: 14px; color: #06b6d4; font-weight: 600;">

    // ═══════════════════════════════════════════════════════

    document.getElementById('production').innerHTML = renderProduction();
    document.getElementById('diagram').innerHTML = renderDiagram();

    document.getElementById('quality').innerHTML = renderQuality();

    // Actualización en tiempo real para vista de reactor
    setInterval(() => {
      const noise = () => (Math.random() - 0.5) * 2;
      const tempEl = document.getElementById('temp-live');
      const pressureEl = document.getElementById('pressure-live');
      const butaneEl = document.getElementById('butane-live');
      const yieldEl = document.getElementById('yield-live');

      if (tempEl) {
        tempEl.innerHTML = `${(420 + noise() * 8).toFixed(1)}<span class="stat-unit">°C</span>`;
        pressureEl.innerHTML = `${(2.1 + noise() * 0.15).toFixed(2)}<span class="stat-unit">bar</span>`;
        butaneEl.innerHTML = `${(42 + noise() * 3).toFixed(1)}<span class="stat-unit">kg/h</span>`;
        yieldEl.innerHTML = `${(68 + noise() * 4).toFixed(1)}<span class="stat-unit">%</span>`;
      }

      // Actualización de los valores del diagrama interactivo
      const tempNow = 420 + noise() * 8;
      const pressureNow = 2.1 + noise() * 0.15;

      // Actualizar gauges circulares
      const tempGaugeValue = document.getElementById('temp-gauge-value');
      const pressureGaugeValue = document.getElementById('pressure-gauge-value');
      const tempGauge = document.getElementById('temp-gauge');
      const pressureGauge = document.getElementById('pressure-gauge');

      if (tempGaugeValue) {
        tempGaugeValue.textContent = tempNow.toFixed(1);
        const circumference = 2 * Math.PI * 54;
        tempGauge.style.strokeDashoffset = circumference * (1 - tempNow / 500);
      }

      if (pressureGaugeValue) {
        pressureGaugeValue.textContent = pressureNow.toFixed(2);
        const circumference = 2 * Math.PI * 54;
        pressureGauge.style.strokeDashoffset = circumference * (1 - pressureNow / 5);
      }

      // Actualizar etiquetas en el reactor SVG
      const reactorTempLabel = document.getElementById('reactor-temp-label');
      const reactorPressureLabel = document.getElementById('reactor-pressure-label');

      if (reactorTempLabel) {
        reactorTempLabel.textContent = tempNow.toFixed(0) + '°C';
      }

      if (reactorPressureLabel) {
        reactorPressureLabel.textContent = pressureNow.toFixed(2) + ' bar';
      }

      // Actualizar valores en las tarjetas de control
      const tempValue1 = document.getElementById('temp-value-1');
      const pressureValue1 = document.getElementById('pressure-value-1');

      if (tempValue1) {
        tempValue1.textContent = tempNow.toFixed(1) + '°C';
      }

      if (pressureValue1) {
        pressureValue1.textContent = pressureNow.toFixed(2) + ' bar';
      }
    }, 2000);
